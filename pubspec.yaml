name: service_reminder
description: Technician-focused RO service reminder app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  supabase_flutter: ^2.5.0
  intl: ^0.20.2
  fl_chart: ^0.69.0
  record: ^5.1.2
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  just_audio: ^0.9.42
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2
  pdf: ^3.12.0
  share_plus: ^12.0.2
  font_awesome_flutter: ^10.8.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# record 5.x pins record_linux 0.7.x, which does not implement record_platform_interface 1.5+
# (breaks kernel compile even for Android). Use 1.3+ for a matching implementation.
dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  generate: true
